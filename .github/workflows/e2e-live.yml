name: Live E2E Tests

on:
  workflow_dispatch:
  schedule:
    # Nightly at 06:00 UTC
    - cron: '0 6 * * *'

# Prevent parallel runs that would double OpenRouter spend.
concurrency:
  group: e2e-live
  cancel-in-progress: true

jobs:
  e2e-live:
    name: Kind live e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      RELEASE: sec-review-e2e
      NAMESPACE: sec-review-e2e
      CLUSTER: sec-review-e2e

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      # -----------------------------------------------------------------------
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      # -----------------------------------------------------------------------
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --all-extras

      # -----------------------------------------------------------------------
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      # -----------------------------------------------------------------------
      - name: Bootstrap kind cluster
        env:
          OPENROUTER_TEST_KEY: ${{ secrets.OPENROUTER_TEST_KEY }}
        run: ./scripts/e2e-live/bootstrap.sh

      # -----------------------------------------------------------------------
      - name: Start port-forward (background)
        run: |
          kubectl port-forward -n "${NAMESPACE}" "svc/${RELEASE}-coordinator" 8080:8080 &
          sleep 5

      # -----------------------------------------------------------------------
      - name: Run backend live tests
        run: make kind-e2e-pytest

      # -----------------------------------------------------------------------
      - name: Run frontend live tests
        run: make kind-e2e-playwright

      # -----------------------------------------------------------------------
      - name: Dump pod diagnostics (on failure)
        if: failure()
        run: |
          echo "=== kubectl describe pods ==="
          kubectl describe pods -n "${NAMESPACE}" || true
          echo ""
          echo "=== coordinator logs ==="
          kubectl logs -n "${NAMESPACE}" \
            -l app.kubernetes.io/component=coordinator \
            --tail=200 || true
          echo ""
          echo "=== worker pod logs ==="
          kubectl logs -n "${NAMESPACE}" \
            -l app.kubernetes.io/component=worker \
            --tail=100 || true

      - name: Upload diagnostic logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-live-diagnostics
          path: |
            /tmp/e2e-diagnostics/
          if-no-files-found: ignore
          retention-days: 7

      # -----------------------------------------------------------------------
      - name: Teardown kind cluster
        if: always()
        run: ./scripts/e2e-live/teardown.sh
