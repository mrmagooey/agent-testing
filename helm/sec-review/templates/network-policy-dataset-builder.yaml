{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sec-review.fullname" . }}-dataset-builder-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sec-review.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      role: dataset-builder
  policyTypes:
    - Egress
  egress:
    # GitHub HTTPS
    - ports:
        - protocol: TCP
          port: 443
      to:
        {{- range .Values.networkPolicy.datasetBuilder.githubCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
    {{- with .Values.networkPolicy.datasetBuilder.docsetsCidrs }}
    # DevDocs HTTPS (documents.devdocs.io — Fastly CDN)
    - ports:
        - protocol: TCP
          port: 443
      to:
        {{- range . }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
    {{- end }}
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # NFS / shared storage
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.nfsPort }}
{{- end }}
