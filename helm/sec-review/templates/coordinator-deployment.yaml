apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sec-review.fullname" . }}-coordinator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sec-review.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
spec:
  replicas: {{ .Values.coordinator.replicas }}
  selector:
    matchLabels:
      {{- include "sec-review.coordinator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.coordinator.imageDigest }}
      annotations:
        sec-review.io/coordinator-image-digest: {{ . | quote }}
      {{- end }}
      labels:
        {{- include "sec-review.labels" . | nindent 8 }}
        {{- include "sec-review.coordinator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sec-review.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coordinator
          image: {{ include "sec-review.coordinatorImage" . | quote }}
          imagePullPolicy: {{ .Values.image.coordinator.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.coordinator.service.port }}
          volumeMounts:
            - name: shared-data
              mountPath: {{ .Values.coordinator.storageRoot }}
            - name: config
              mountPath: /app/config
          {{- if .Values.secrets.create }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.name }}
          {{- end }}
          env:
            - name: STORAGE_ROOT
              value: {{ .Values.coordinator.storageRoot | quote }}
            - name: WORKER_IMAGE
              value: {{ include "sec-review.workerImage" . | quote }}
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: CONFIG_DIR
              value: /app/config
            - name: SHARED_PVC_NAME
              value: {{ .Values.storage.existingClaim | default (printf "%s-data" (include "sec-review.fullname" .)) | quote }}
            - name: LLM_SECRET_NAME
              value: {{ .Values.secrets.name | quote }}
            - name: CONFIG_MAP_NAME
              value: {{ .Values.coordinator.configMapName | quote }}
            - name: WORKER_IMAGE_PULL_POLICY
              value: {{ .Values.image.worker.pullPolicy | quote }}
            # Tool-extension availability flags — consumed by the coordinator's
            # /api/tool-extensions endpoint (Chunk 6).  Set from workerTools values
            # so operators can disable an extension in one place without rebuilding.
            - name: TOOL_EXT_LSP_AVAILABLE
              value: {{ .Values.workerTools.lsp.enabled | toString | quote }}
            - name: TOOL_EXT_TREE_SITTER_AVAILABLE
              value: {{ .Values.workerTools.treeSitter.enabled | toString | quote }}
            - name: TOOL_EXT_DEVDOCS_AVAILABLE
              value: {{ .Values.workerTools.devdocs.enabled | toString | quote }}
            # Provider-probe flags — consumed by the coordinator's catalog probing logic.
            - name: PROVIDER_PROBE_ENABLED
              value: {{ .Values.providerProbe.enabled | toString | quote }}
            - name: PROVIDER_PROBE_TTL_SECONDS
              value: {{ .Values.providerProbe.ttlSeconds | toString | quote }}
            - name: PROVIDER_PROBE_MAX_STALE_SECONDS
              value: {{ .Values.providerProbe.maxStaleSeconds | toString | quote }}
            - name: BEDROCK_PROBE_ENABLED
              value: {{ .Values.providerProbe.bedrock.enabled | toString | quote }}
            - name: BEDROCK_PROBE_REGIONS
              value: {{ .Values.providerProbe.bedrock.regions | join "," | quote }}
            {{- with .Values.providerEndpoints.localLlm.baseUrl }}
            - name: LOCAL_LLM_BASE_URL
              value: {{ . | quote }}
            {{- end }}
            - name: DEVDOCS_ROOT
              value: {{ .Values.workerTools.devdocs.docsetsPath | quote }}
            - name: DEVDOCS_ALLOW_DOCSETS
              value: {{ .Values.workerTools.devdocs.docsets | join "," | quote }}
            {{- if .Values.secrets.create }}
            - name: LLM_PROVIDER_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: LLM_PROVIDER_ENCRYPTION_KEY
            {{- end }}
            {{- with .Values.coordinator.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.coordinator.resources | nindent 12 }}
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ .Values.storage.existingClaim | default (printf "%s-data" (include "sec-review.fullname" .)) }}
        - name: config
          configMap:
            name: {{ .Values.coordinator.configMapName }}
