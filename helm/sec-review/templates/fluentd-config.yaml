{{- if .Values.fluentd.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.fluentd.configMapName }}
  namespace: {{ .Values.fluentd.namespace }}
  labels:
    {{- include "sec-review.labels" . | nindent 4 }}
    app: fluentd
data:
  fluent.conf: |
    <source>
      @type tail
      path /var/log/pods/{{ .Release.Namespace }}_*/*/*.log
      pos_file /var/log/fluentd-worker.pos
      tag kubernetes.worker.*
      <parse>
        @type cri
      </parse>
    </source>

    <filter kubernetes.worker.**>
      @type grep
      <regexp>
        key $.kubernetes.labels.app
        pattern ^sec-review-worker$
      </regexp>
    </filter>

    <match kubernetes.worker.**>
      @type loki
      url {{ .Values.fluentd.lokiUrl }}
      flush_interval {{ .Values.fluentd.flushIntervalSeconds }}s
      <label>
        app $.kubernetes.labels.app
        experiment_id $.kubernetes.labels.experiment_id
        run_id $.kubernetes.labels.run_id
      </label>
    </match>
{{- end }}
