{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sec-review.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secrets.apiKeys.openai }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.anthropic }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.gemini }}
  GEMINI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.mistral }}
  MISTRAL_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.cohere }}
  COHERE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.openrouter }}
  OPENROUTER_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.baseUrls.openai }}
  OPENAI_BASE_URL: {{ . | quote }}
  {{- end }}
{{- end }}
