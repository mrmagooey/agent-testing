{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sec-review.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secrets.apiKeys.openai }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.anthropic }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.gemini }}
  GEMINI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.mistral }}
  MISTRAL_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.cohere }}
  COHERE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.openrouter }}
  OPENROUTER_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys.local }}
  LOCAL_LLM_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.baseUrls.openai }}
  OPENAI_BASE_URL: {{ . | quote }}
  {{- end }}
  {{- if .Values.secrets.aws.enabled }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.aws.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.aws.secretAccessKey | quote }}
  {{- with .Values.secrets.aws.sessionToken }}
  AWS_SESSION_TOKEN: {{ . | quote }}
  {{- end }}
  AWS_REGION: {{ .Values.secrets.aws.region | quote }}
  {{- end }}
  # Fernet encryption key for custom provider API keys stored in the database.
  # Generate once with:
  #   python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'
  # Commit the result to your values file (or store in Vault/SOPS).
  # Do NOT regenerate on upgrade — it breaks decryption of existing ciphertexts.
  LLM_PROVIDER_ENCRYPTION_KEY: {{ required "secrets.encryptionKey must be set when secrets.create is true" .Values.secrets.encryptionKey | quote }}
{{- end }}
