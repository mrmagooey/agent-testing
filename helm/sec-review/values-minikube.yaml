# -----------------------------------------------------------------------------
# Minikube overrides
#
# Usage:
#   helm install sec-review ./helm/sec-review \
#     --namespace sec-review --create-namespace \
#     --values ./helm/sec-review/values-minikube.yaml \
#     --set-string secrets.apiKeys.openrouter=$OPENROUTER_TEST_KEY
# -----------------------------------------------------------------------------

# Images built inside minikube's docker daemon — never pull from a registry.
image:
  coordinator:
    pullPolicy: Never
  worker:
    pullPolicy: Never
  datasetBuilder:
    pullPolicy: Never

# Minikube's default storage class supports only ReadWriteOnce.
storage:
  storageClassName: standard
  accessMode: ReadWriteOnce
  size: 10Gi

# Expose the coordinator via NodePort so `minikube service coordinator` works.
coordinator:
  service:
    type: NodePort

# Expose the coordinator via the nginx ingress. Requires
# `minikube addons enable ingress` on the agent-testing profile. Access via:
#   open http://$(minikube -p agent-testing ip)/
# The empty host makes this a catch-all — any Host header (or a raw IP hit)
# routes to the coordinator, so no /etc/hosts entry is needed.
ingress:
  enabled: true
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

# Disable cluster features not available out-of-the-box on minikube.
# Enable individually if you install the corresponding addon / operator.
networkPolicy:
  enabled: false    # enable after `minikube addons enable calico`
serviceMonitor:
  enabled: false    # requires Prometheus Operator (kube-prometheus-stack)
gatekeeper:
  enabled: false    # requires Gatekeeper installed
fluentd:
  enabled: false    # requires `logging` namespace + Loki

# Disable the devdocs-sync post-upgrade hook for local dev.
# The hook requires sec-review-dataset-builder:latest which is not built
# by `make redeploy`. Enable and build the image separately if needed.
workerTools:
  devdocs:
    enabled: false

# Use PVC transport for local dev: simpler setup, no network hop needed.
workerResultTransport: "pvc"

# Enable bundle import in local dev environments.
coordinator:
  importEnabled: "true"

# Example: point the local_llm probe at a LAN inference endpoint.
# providerEndpoints:
#   localLlm:
#     baseUrl: "http://192.168.49.1:8080"
