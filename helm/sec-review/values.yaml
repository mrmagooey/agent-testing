# -----------------------------------------------------------------------------
# Default values for sec-review.
# Defaults are production-oriented — see values-minikube.yaml for local dev.
# -----------------------------------------------------------------------------

nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# Images
#
# All runtime images. The coordinator uses image.worker.* to set the
# WORKER_IMAGE env var, so changing the worker image here automatically
# updates what K8s Job pods pull.
# -----------------------------------------------------------------------------
image:
  coordinator:
    repository: sec-review-coordinator
    tag: latest
    pullPolicy: IfNotPresent
  worker:
    repository: sec-review-worker
    tag: latest
    pullPolicy: IfNotPresent
  datasetBuilder:
    repository: sec-review-dataset-builder
    tag: latest
    pullPolicy: IfNotPresent
  # imagePullSecrets: applied to coordinator pod; worker pods inherit via the
  # coordinator's ServiceAccount.
  pullSecrets: []
  # - name: ghcr-pull-secret

# -----------------------------------------------------------------------------
# Coordinator deployment
# -----------------------------------------------------------------------------
coordinator:
  replicas: 1

  # Opaque identifier embedded in the pod template as an annotation. When the
  # value changes, Helm rolls the Deployment — useful with floating tags like
  # :latest where the PodSpec is otherwise stable across rebuilds. Leave blank
  # to omit the annotation entirely; the Makefile populates this from the local
  # minikube docker daemon on helm-install-minikube.
  imageDigest: ""

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Extra environment variables merged into the coordinator container.
  extraEnv: []
  # - name: LOG_LEVEL
  #   value: INFO

  # STORAGE_ROOT controls where the coordinator reads/writes run artifacts.
  # Must point at the mount path of the shared PVC.
  storageRoot: /data

  # Name of the ConfigMap containing config/*.yaml; rendered into /app/config
  configMapName: experiment-config

# -----------------------------------------------------------------------------
# Ingress
#
# Disabled by default; enable to expose the coordinator (which serves both the
# /api/* JSON endpoints and the bundled frontend at /) outside the cluster.
# Requires an Ingress controller (nginx, traefik, ALB, …) installed separately.
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-body-size: 10m
  hosts:
    - host: sec-review.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: sec-review-tls
    #   hosts:
    #     - sec-review.local

# -----------------------------------------------------------------------------
# Shared storage
#
# Minikube default storage class (`standard`) supports only ReadWriteOnce.
# Production clusters with EFS/NFS should use ReadWriteMany so multiple
# worker pods can write concurrently.
# -----------------------------------------------------------------------------
storage:
  storageClassName: efs-sc
  accessMode: ReadWriteMany
  size: 50Gi
  # Set to an existing PVC name to skip PVC creation:
  existingClaim: ""

# -----------------------------------------------------------------------------
# LLM API key secret
#
# PRODUCTION: set secrets.create=false and manage llm-api-keys via
# external-secrets, sealed-secrets, or an AWS Secrets Manager CSI driver.
# Any key left blank is omitted from the rendered Secret.
# -----------------------------------------------------------------------------
secrets:
  create: true
  name: llm-api-keys
  apiKeys:
    openai: ""
    anthropic: ""
    gemini: ""
    mistral: ""
    cohere: ""
    local: ""
    openrouter: ""
  baseUrls:
    openai: ""
  # AWS credentials for Bedrock. Prefer IRSA (set serviceAccount.annotations) in production.
  aws:
    enabled: false
    accessKeyId: ""
    secretAccessKey: ""
    sessionToken: ""
    region: "us-east-1"

# -----------------------------------------------------------------------------
# Controls live upstream model-catalog probing from the coordinator.
# -----------------------------------------------------------------------------
providerProbe:
  enabled: true
  ttlSeconds: 600
  # Maximum age (seconds) a stale snapshot is returned before the catalog
  # gives up and reports probe_status=failed.  Defaults to ttlSeconds*6.
  maxStaleSeconds: 3600
  bedrock:
    enabled: false
    regions:
      - us-east-1

# -----------------------------------------------------------------------------
# Provider endpoints — base URLs for self-hosted / LAN inference endpoints.
# These are configuration, not secrets. Leave blank to disable probing.
# -----------------------------------------------------------------------------
providerEndpoints:
  localLlm:
    baseUrl: ""   # e.g. http://192.168.7.100:8080

# -----------------------------------------------------------------------------
# Network policies
#
# Require a CNI with NetworkPolicy support (Calico, Cilium, …). Minikube
# default CNI does not enforce them — disable in values-minikube.yaml.
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: true
  worker:
    # CIDR(s) the worker is allowed to reach on :443 (LLM providers).
    # Narrow to specific provider ranges for tighter egress control.
    llmEgressCidrs:
      - 0.0.0.0/0
  datasetBuilder:
    # CIDR(s) the dataset-builder can reach for cloning repos.
    githubCidrs:
      - 140.82.112.0/20
      - 192.30.252.0/22
    # CIDR(s) the devdocs-sync Job can reach to fetch DevDocs docsets
    # (documents.devdocs.io is fronted by Fastly; these ranges drift, so pin
    # narrowly in production or point devdocs_sync at an internal mirror).
    docsetsCidrs:
      - 151.101.0.0/16
      - 199.232.0.0/16
  # NFS port used for intra-namespace shared-storage traffic.
  nfsPort: 2049

# -----------------------------------------------------------------------------
# Prometheus ServiceMonitor
# Requires the Prometheus Operator CRDs to be installed in the cluster.
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  interval: 15s
  path: /metrics

# -----------------------------------------------------------------------------
# Gatekeeper ConstraintTemplate + Constraint
# Requires Gatekeeper to be installed in the cluster.
#
# If allowedImages is empty, the list is auto-populated from image.worker and
# image.datasetBuilder. Override with an explicit list in production to pin
# exact digests.
# -----------------------------------------------------------------------------
gatekeeper:
  enabled: true
  allowedImages: []
  # - ghcr.io/myorg/sec-review/worker:v1.0.0
  # - ghcr.io/myorg/sec-review/dataset-builder:v1.0.0

# -----------------------------------------------------------------------------
# Fluentd log shipper config
# The ConfigMap targets the `logging` namespace (external to this release)
# and assumes Loki is reachable at lokiUrl.
# -----------------------------------------------------------------------------
fluentd:
  enabled: true
  namespace: logging
  configMapName: fluentd-worker-config
  lokiUrl: http://loki.monitoring.svc.cluster.local:3100
  flushIntervalSeconds: 5

# -----------------------------------------------------------------------------
# Worker tool extensions
#
# Controls which optional MCP-backed tool dimensions are available in worker pods.
# The coordinator reads TOOL_EXT_<NAME>_AVAILABLE env vars (injected below via
# the coordinator-deployment template) to build the /api/tool-extensions response
# (Chunk 6).  Disabling an extension here does NOT remove its packages from the
# worker image — it merely signals that the coordinator should not schedule runs
# that request that extension.
# -----------------------------------------------------------------------------
workerTools:
  treeSitter:
    enabled: true
    # grammars is informational — the image bakes them in via the Dockerfile init()
    # call.  This list is surfaced by /api/tool-extensions so the frontend can show
    # which languages are supported (Chunk 6).
    grammars:
      - python
      - javascript
      - typescript
      - tsx
      - go
      - java
      - ruby
      - rust
      - c
      - cpp
      - php
      - bash
      - yaml
      - json
      - hcl
      - dockerfile
      - sql
  lsp:
    enabled: true
    # servers lists the language-server binaries installed in the worker image.
    # Informational only — the LSP multiplexer discovers availability via PATH.
    # Surfaced by /api/tool-extensions (Chunk 6).
    servers:
      - pyright-langserver
      - gopls
      - typescript-language-server
      - rust-analyzer
      - clangd
  devdocs:
    enabled: true
    # Path where docsets are mounted from the shared PVC.
    # The devdocs-sync Job populates this path; workers read from it.
    docsetsPath: /data/devdocs
    # Docsets to sync. Used by the devdocs-sync Job entrypoint.
    # Add or remove slugs here to control which offline docs are available.
    docsets:
      - python~3.12
      - javascript
      - typescript
      - go
      - rust
      - cpp
      - ruby
      - php
      - bash
      - nodejs
      - express
      - flask
      - django
      - aws
      - openapi
      - http
      - dom

# -----------------------------------------------------------------------------
# ServiceAccount / RBAC
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: coordinator-sa
  # add an `annotations: {}` block, e.g. eks.amazonaws.com/role-arn for IRSA
  annotations: {}

rbac:
  create: true

# -----------------------------------------------------------------------------
# Worker result transport
#
# Controls how worker pods deliver their output artifacts to the coordinator.
#
#   "http" (default for new installs):
#     Workers write to a pod-local emptyDir then stream-upload to
#     POST /api/internal/runs/{run_id}/result.  The PVC is mounted read-only
#     for workers.  The coordinator becomes the single PVC writer.
#
#   "pvc":
#     Workers write directly to the shared PVC (legacy behaviour).
#     Use this during transition or on clusters where HTTP egress to the
#     coordinator service is restricted.
# -----------------------------------------------------------------------------
workerResultTransport: "http"
