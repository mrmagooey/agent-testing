apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator
  namespace: sec-review
  labels:
    app: sec-review-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sec-review-coordinator
  template:
    metadata:
      labels:
        app: sec-review-coordinator
    spec:
      serviceAccountName: coordinator-sa
      containers:
        - name: coordinator
          image: sec-review-coordinator:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: shared-data
              mountPath: /data
            - name: config
              mountPath: /app/config
          env:
            - name: STORAGE_ROOT
              value: /data
            - name: WORKER_IMAGE
              value: sec-review-worker:latest
            - name: NAMESPACE
              value: sec-review
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: sec-review-data
        - name: config
          configMap:
            name: experiment-config
