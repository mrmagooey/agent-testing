apiVersion: v1
kind: ServiceAccount
metadata:
  name: coordinator-sa
  namespace: sec-review
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-manager
  namespace: sec-review
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]     # for job status
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]                      # for debugging failed workers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coordinator-job-manager
  namespace: sec-review
subjects:
  - kind: ServiceAccount
    name: coordinator-sa
    namespace: sec-review
roleRef:
  kind: Role
  name: job-manager
  apiGroup: rbac.authorization.k8s.io
