apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-egress
  namespace: sec-review
spec:
  podSelector:
    matchLabels:
      app: sec-review-worker
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS to LLM provider endpoints only
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0        # narrowed by ports; for tighter control,
                                     # resolve provider IPs and list explicitly
      ports:
        - protocol: TCP
          port: 443
    # Allow NFS to shared storage (within namespace)
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 2049
