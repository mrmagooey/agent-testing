# Curated registry of models available to experiments. The coordinator reads
# this file at startup; the frontend picker shows each entry, gated by whether
# the required API key (or AWS credentials, for Bedrock) is set.
#
# Schema:
#   defaults:  optional; merged under every entry, per-entry fields win
#   providers: mapping of stable_id -> entry
#
# Entry fields:
#   model_name      provider-specific identifier passed to LiteLLM
#   temperature     default inherited from defaults
#   max_tokens      default inherited from defaults
#   api_key_env     env var holding the key (required when auth=api_key)
#   auth            "api_key" (default) or "aws"
#   region          AWS region (required when auth=aws)
#   display_name    human label shown in UI

defaults:
  temperature: 0.2
  max_tokens: 8192

providers:
  # --- OpenAI ---
  gpt-4o:
    model_name: "gpt-4o"
    api_key_env: "OPENAI_API_KEY"
    display_name: "GPT-4o"
  gpt-4o-mini:
    model_name: "gpt-4o-mini"
    api_key_env: "OPENAI_API_KEY"
    display_name: "GPT-4o mini"
  gpt-4.1:
    model_name: "gpt-4.1"
    api_key_env: "OPENAI_API_KEY"
    display_name: "GPT-4.1"
  gpt-4.1-mini:
    model_name: "gpt-4.1-mini"
    api_key_env: "OPENAI_API_KEY"
    display_name: "GPT-4.1 mini"
  o1:
    model_name: "o1"
    api_key_env: "OPENAI_API_KEY"
    display_name: "o1"
  o3:
    model_name: "o3"
    api_key_env: "OPENAI_API_KEY"
    display_name: "o3"
  o3-mini:
    model_name: "o3-mini"
    api_key_env: "OPENAI_API_KEY"
    display_name: "o3 mini"
  o4-mini:
    model_name: "o4-mini"
    api_key_env: "OPENAI_API_KEY"
    display_name: "o4 mini"

  # --- Anthropic ---
  claude-opus-4-7:
    model_name: "claude-opus-4-7"
    api_key_env: "ANTHROPIC_API_KEY"
    display_name: "Claude Opus 4.7"
  claude-sonnet-4-6:
    model_name: "claude-sonnet-4-6"
    api_key_env: "ANTHROPIC_API_KEY"
    display_name: "Claude Sonnet 4.6"
  claude-haiku-4-5:
    model_name: "claude-haiku-4-5"
    api_key_env: "ANTHROPIC_API_KEY"
    display_name: "Claude Haiku 4.5"
  claude-3-5-sonnet-latest:
    model_name: "claude-3-5-sonnet-latest"
    api_key_env: "ANTHROPIC_API_KEY"
    display_name: "Claude 3.5 Sonnet (latest)"
  claude-3-5-haiku-latest:
